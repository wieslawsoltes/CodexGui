<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CodexGui social banner</title>
  <desc id="desc">CodexGui banner with the product mark, title, and key capabilities.</desc>
  <defs>
    <linearGradient id="cg-banner-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08142b" />
      <stop offset="0.5" stop-color="#143066" />
      <stop offset="1" stop-color="#5c37d9" />
    </linearGradient>
    <radialGradient id="cg-banner-glow" cx="82%" cy="16%" r="72%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cg-mark-surface" x1="100" y1="110" x2="332" y2="346" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2459d2" />
      <stop offset="0.55" stop-color="#4a6cff" />
      <stop offset="1" stop-color="#8c4fff" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#cg-banner-bg)" />
  <rect width="1200" height="630" rx="36" fill="url(#cg-banner-glow)" />

  <g opacity="0.18">
    <circle cx="1040" cy="128" r="112" fill="#d7e5ff" />
    <circle cx="1116" cy="214" r="58" fill="#ffffff" />
  </g>

  <g transform="translate(92 126)">
    <rect x="0" y="0" width="240" height="240" rx="62" fill="#091329" />
    <rect x="8" y="8" width="224" height="224" rx="54" fill="url(#cg-mark-surface)" />
    <rect x="8" y="8" width="224" height="224" rx="54" fill="none" stroke="#bcd4ff" stroke-opacity="0.24" stroke-width="2" />

    <rect x="42" y="50" width="156" height="148" rx="30" fill="#081326" fill-opacity="0.30" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" />
    <rect x="42" y="50" width="156" height="32" rx="30" fill="#ffffff" fill-opacity="0.16" />

    <circle cx="63" cy="66" r="3.7" fill="#dfe8ff" fill-opacity="0.95" />
    <circle cx="76" cy="66" r="3.7" fill="#dfe8ff" fill-opacity="0.82" />
    <circle cx="89" cy="66" r="3.7" fill="#dfe8ff" fill-opacity="0.68" />

    <rect x="64" y="100" width="24" height="86" rx="12" fill="#edf4ff" />
    <rect x="104" y="100" width="66" height="20" rx="10" fill="#ffffff" />
    <rect x="104" y="132" width="78" height="17" rx="8.5" fill="#dae7ff" />
    <rect x="104" y="162" width="54" height="13" rx="6.5" fill="#a9c7ff" />

    <path d="M173 95l10 24 24 10-24 10-10 24-10-24-24-10 24-10 10-24Z" fill="#ffffff" />
    <path d="M173 105l6 15 15 6-15 6-6 15-6-15-15-6 15-6 6-15Z" fill="#c6d6ff" />
  </g>

  <g fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="402" y="194" font-size="34" font-weight="600" opacity="0.78">Avalonia desktop client</text>
    <text x="402" y="304" font-size="108" font-weight="760">CodexGui</text>
    <text x="402" y="372" font-size="33" opacity="0.92">Native client for the Codex app-server protocol</text>
    <text x="402" y="424" font-size="28" opacity="0.76">Typed transport, workspace shell, and reusable markdown rendering.</text>
  </g>

  <g transform="translate(402 468)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g>
      <rect width="180" height="46" rx="23" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.20" />
      <text x="90" y="29" fill="#ffffff" font-size="22" text-anchor="middle">Typed transport</text>
    </g>
    <g transform="translate(196 0)">
      <rect width="178" height="46" rx="23" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.20" />
      <text x="89" y="29" fill="#ffffff" font-size="22" text-anchor="middle">Workspace shell</text>
    </g>
    <g transform="translate(390 0)">
      <rect width="202" height="46" rx="23" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.20" />
      <text x="101" y="29" fill="#ffffff" font-size="22" text-anchor="middle">Markdown stack</text>
